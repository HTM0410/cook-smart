version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com

  build:
    commands:
      - echo "Building backend Docker image..."
      - cd src/backend
      - docker build -t backend-build -f Dockerfile .
      - docker tag backend-build 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com/cooksmart-backend:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com/cooksmart-backend:latest
      - echo "Build complete: cooksmart-backend:latest"
