name: Build and Deploy to AWS ECS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (production/staging)'
        required: true
        default: 'staging'

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '294060270105' }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND || 'cooksmart-backend' }}
  ECR_REPOSITORY_YOLO: ${{ vars.ECR_REPOSITORY_YOLO || 'cooksmart-yolo' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'cooksmart-prod-v2' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'cooksmart-prod-v2-yolo-svc' }}

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}
          tags: |
            type=sha

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./docker/backend.Dockerfile
          no-cache: true
          build-args: |
            NODE_ENV=production

  build-yolo:
    name: Build YOLO Image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr-yolo
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr-yolo.outputs.registry }}/${{ env.ECR_REPOSITORY_YOLO }}
          tags: |
            type=sha

      - name: Build and push YOLO image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./docker/yolo.Dockerfile
          no-cache: true

  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    needs: build-backend
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download task definition
        id: task-def-backend
        run: |
          FAMILY=$(jq -r '.family' .aws/ecs-task-def-backend.json)
          echo "Family: $FAMILY"
          
          # Lấy task definition hiện tại từ ECS, hoặc dùng file JSON local nếu chưa tồn tại
          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition > task-def-backend.json 2>/dev/null || \
            jq '. | del(.revision, .status, .registeredAt, .registeredBy, .compatibilities, .runtimePlatform, .requiresAttributes, .taskDefinitionArn)' .aws/ecs-task-def-backend.json > task-def-backend.json
          
          ACCOUNT_ID="${{ env.AWS_ACCOUNT_ID }}"
          sed -i "s/\${AWS_ACCOUNT_ID}/$ACCOUNT_ID/g" task-def-backend.json
          
          jq --arg ROLE "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole" \
            '.executionRoleArn = $ROLE' task-def-backend.json > task-def-backend-final.json
          
          # Substitute image URL
          sed -i "s|REPLACE_WITH_IMAGE_URL|${{ needs.build-backend.outputs.image_tag }}|g" task-def-backend-final.json
          
          cat task-def-backend-final.json

      - name: Deploy Backend task definition
        id: deploy-backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-backend-final.json
          service: ${{ vars.ECS_SERVICE_BACKEND || 'cooksmart-backend' }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-yolo:
    name: Deploy YOLO to ECS
    runs-on: ubuntu-latest
    needs: build-yolo
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download task definition
        id: task-def-yolo
        run: |
          FAMILY=$(jq -r '.family' .aws/ecs-task-def-yolo.json)
          echo "Family: $FAMILY"
          
          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition > task-def-yolo.json 2>/dev/null || \
            jq '. | del(.revision, .status, .registeredAt, .registeredBy, .compatibilities, .runtimePlatform, .requiresAttributes, .taskDefinitionArn)' .aws/ecs-task-def-yolo.json > task-def-yolo.json
          
          ACCOUNT_ID="${{ env.AWS_ACCOUNT_ID }}"
          sed -i "s/\${AWS_ACCOUNT_ID}/$ACCOUNT_ID/g" task-def-yolo.json
          
          jq --arg ROLE "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole" \
            '.executionRoleArn = $ROLE' task-def-yolo.json > task-def-yolo-final.json
          
          sed -i "s|REPLACE_WITH_IMAGE_URL|${{ needs.build-yolo.outputs.image_tag }}|g" task-def-yolo-final.json

      - name: Deploy YOLO task definition
        id: deploy-yolo
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-yolo-final.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-backend, build-yolo, deploy-backend, deploy-yolo]
    if: always()

    steps:
      - name: Generate deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Deploy | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YOLO Build | ${{ needs.build-yolo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YOLO Deploy | ${{ needs.deploy-yolo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
