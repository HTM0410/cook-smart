name: Deploy to Production (Lambda)

# =============================================================================
# Workflow chinh deploy backend-api, yolo-infer, drift-job len AWS Lambda.
# Thay the deploy-ecs.yml cu (ECS Fargate rolling update) va build-yolo.yml.
#
# Flow:
#   1. Build 3 Docker images (backend, yolo, drift) song song
#   2. Push len ECR (tag = ${{ github.sha }})
#   3. Update Lambda function code + publish version + update alias 'prod'
#   4. (Optional) Promote model artifact len S3 (hybrid W&B -> S3 mirror)
# =============================================================================

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - 'src/backend/src/model_detection/yolo_inference_service/**'
      - 'mlops/drift/**'
      - 'docker/*.Lambda.Dockerfile'
      - 'docker-compose.lambda.yml'
      - '.github/workflows/deploy-prod.yml'
      - 'infra/scripts/deploy-lambda.sh'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, backend, yolo, drift)'
        required: true
        default: 'all'
      image_tag:
        description: 'Override image tag (default: github.sha)'
        required: false
        default: ''

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com
  REPO_BACKEND: cooksmart-backend
  REPO_YOLO: cooksmart-yolo
  REPO_DRIFT: cooksmart-drift

jobs:
  # ----------------------------------------------------------------------------
  # Build + push 3 Docker images song song
  # ----------------------------------------------------------------------------
  build-images:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: docker/backend.Lambda.Dockerfile
            context: .
            repo: cooksmart-backend
            image_name: cooksmart-backend
            condition: "true"
          - service: yolo
            dockerfile: docker/yolo.Lambda.Dockerfile
            context: .
            repo: cooksmart-yolo
            image_name: cooksmart-yolo
            condition: "true"
          - service: drift
            dockerfile: docker/drift.Lambda.Dockerfile
            context: .
            repo: cooksmart-drift
            image_name: cooksmart-drift
            condition: "true"
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '294060270105' }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{short_sha}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/arm64
          provenance: false
          sbom: false

      - name: Verify image in ECR
        run: |
          echo "Verifying ${{ matrix.repo }}:${{ github.sha }}..."
          aws ecr describe-images --repository-name ${{ matrix.repo }} \
            --image-ids imageTag=${{ github.sha }} \
            --query 'imageDetails[0].imagePushedAt' --output text

  # ----------------------------------------------------------------------------
  # Update Lambda function code (sau khi build xong)
  # ----------------------------------------------------------------------------
  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '294060270105' }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine service
        id: svc
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "service=${{ github.event.inputs.service }}" >> $GITHUB_OUTPUT
            echo "override_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "service=all" >> $GITHUB_OUTPUT
            echo "override_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ steps.svc.outputs.override_tag }}" ]; then
            echo "tag=${{ steps.svc.outputs.override_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy backend-api
        if: steps.svc.outputs.service == 'all' || steps.svc.outputs.service == 'backend'
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.REPO_BACKEND }}:${{ steps.tag.outputs.tag }}"
          bash infra/scripts/deploy-lambda.sh \
            --function cooksmart-prod-v2-backend-api \
            --image "$IMAGE_URI" \
            --alias prod \
            --region ${{ env.AWS_REGION }}

      - name: Deploy yolo-infer
        if: steps.svc.outputs.service == 'all' || steps.svc.outputs.service == 'yolo'
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.REPO_YOLO }}:${{ steps.tag.outputs.tag }}"
          bash infra/scripts/deploy-lambda.sh \
            --function cooksmart-prod-v2-yolo-infer \
            --image "$IMAGE_URI" \
            --alias prod \
            --region ${{ env.AWS_REGION }}

      - name: Deploy drift-job
        if: steps.svc.outputs.service == 'all' || steps.svc.outputs.service == 'drift'
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.REPO_DRIFT }}:${{ steps.tag.outputs.tag }}"
          bash infra/scripts/deploy-lambda.sh \
            --function cooksmart-prod-v2-drift-job \
            --image "$IMAGE_URI" \
            --alias prod \
            --region ${{ env.AWS_REGION }}

      - name: Smoke test
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -e
          # Lay API endpoint tu tag (resolve qua Terraform output hoac API Gateway list)
          API_ID=$(aws apigatewayv2 get-apis --region "$AWS_REGION" --query "Items[?Name=='cooksmart-prod-v2-http-api'].ApiId | [0]" --output text)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "Could not resolve API ID, skipping smoke test"
            exit 0
          fi
          API_URL="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com"
          echo "Smoke test against $API_URL"

          # Health check
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend health: OK"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Backend health check FAILED"
            exit 1
          fi

          # YOLO health
          YOLO_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/yolo/health" || echo "000")
          echo "YOLO health: HTTP $YOLO_CODE"
          if [ "$YOLO_CODE" != "200" ]; then
            echo "YOLO health check FAILED"
            exit 1
          fi
