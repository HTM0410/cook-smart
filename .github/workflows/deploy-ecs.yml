name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - '.github/workflows/deploy-ecs.yml'
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY_BACKEND: cooksmart-backend
  ECR_REPOSITORY_YOLO: cooksmart-yolo
  ECS_CLUSTER: cooksmart-prod-v2
  ECS_SERVICE: cooksmart-prod-v2-yolo-svc

jobs:
  deploy-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '294060270105' }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS task definition
        run: |
          # Get current task definition
          TASK_DEF_ARN=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --query 'services[0].taskDefinition' --output text)
          
          # Get task definition JSON
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN --query 'taskDefinition' --output json > task-definition.json
          
          # Update image in task definition
          jq --arg IMAGE "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.json > new-task-definition.json
          
          # Register new task definition
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://new-task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)
          
          echo "New task definition: $NEW_TASK_DEF_ARN"
          
          # Update ECS service
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --task-definition $NEW_TASK_DEF_ARN --force-new-deployment

      - name: Wait for ECS deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }}

      - name: Deployment summary
        run: |
          echo "✅ Backend deployed successfully!"
          echo "📋 Task Definition: $(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --query 'services[0].taskDefinition' --output text)"
          echo "🔗 Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}"

  deploy-yolo:
    name: Build and Deploy YOLO Service
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || '294060270105' }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr-yolo
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push YOLO Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend/src/model_detection/yolo_inference_service
          file: ./src/backend/src/model_detection/yolo_inference_service/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr-yolo.outputs.registry }}/${{ env.ECR_REPOSITORY_YOLO }}:${{ github.sha }}
            ${{ steps.login-ecr-yolo.outputs.registry }}/${{ env.ECR_REPOSITORY_YOLO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
