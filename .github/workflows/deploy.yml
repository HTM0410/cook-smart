name: Deploy (CodePipeline)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: "CodePipeline name"
        required: true
        default: cooksmart-prod-pipeline

jobs:
  trigger:
    name: Trigger CodePipeline
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (for promotion CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install promotion deps
        run: pip install click boto3 wandb

      - name: Trigger pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          PIPELINE_NAME: ${{ github.event.inputs.pipeline_name || 'cooksmart-prod-pipeline' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'htm0410' }}
          WANDB_PROJECT: ${{ vars.WANDB_PROJECT || 'ingredient-detection' }}
          WANDB_MODEL_ARTIFACT: ${{ vars.WANDB_MODEL_ARTIFACT || 'ingredient-detector' }}
        run: |
          if [ -z "${{ github.event.inputs.pipeline_name }}" ] && [ -z "$PIPELINE_NAME" ]; then
            echo "PIPELINE_NAME required"
            exit 1
          fi
          python -m mlops.serving.promotion trigger-pipeline \
            --pipeline-name "$PIPELINE_NAME" \
            --region "$AWS_REGION"

      - name: Optional: promote + deploy (W&B alias)
        if: vars.WANDB_PROMOTE == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          PIPELINE_NAME: ${{ github.event.inputs.pipeline_name || 'cooksmart-prod-pipeline' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_ENTITY: ${{ vars.WANDB_ENTITY || 'htm0410' }}
          WANDB_PROJECT: ${{ vars.WANDB_PROJECT || 'ingredient-detection' }}
          WANDB_MODEL_ARTIFACT: ${{ vars.WANDB_MODEL_ARTIFACT || 'ingredient-detector' }}
        run: |
          python -m mlops.serving.promotion promote-and-deploy \
            --entity "$WANDB_ENTITY" \
            --project "$WANDB_PROJECT" \
            --artifact "$WANDB_MODEL_ARTIFACT" \
            --pipeline-name "$PIPELINE_NAME" \
            --region "$AWS_REGION"
