name: Build YOLO Image (cloud)

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: 'YOLO source directory relative to repo root (default: src/backend/src/model_detection/yolo_inference_service)'
        required: false
        default: 'src/backend/src/model_detection/yolo_inference_service'
  push:
    branches:
      - main
    paths:
      - 'src/backend/src/model_detection/yolo_inference_service/**'
      - '.github/workflows/build-yolo-only.yml'

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '294060270105' }}
  ECR_REPOSITORY_YOLO: ${{ vars.ECR_REPOSITORY_YOLO || 'cooksmart-yolo' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'cooksmart-prod-v2' }}
  ECS_SERVICE_YOLO: ${{ vars.ECS_SERVICE_YOLO || 'cooksmart-prod-v2-yolo-svc' }}
  YOLO_FAMILY: ${{ vars.YOLO_FAMILY || 'cooksmart-prod-v2-yolo' }}

jobs:
  build-yolo:
    name: Build and push YOLO image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_YOLO }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push YOLO image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.event.inputs.source_dir }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ${{ github.event.inputs.source_dir }}/Dockerfile
          no-cache: true
          provenance: false

  deploy-yolo:
    name: Deploy YOLO to ECS
    runs-on: ubuntu-latest
    needs: build-yolo
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current YOLO task definition
        id: task-def-yolo
        run: |
          set -euo pipefail
          FAMILY="${{ env.YOLO_FAMILY }}"
          echo "Family: $FAMILY"

          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query taskDefinition > task-def-yolo.json 2>/dev/null

          if [ ! -s task-def-yolo.json ]; then
            echo "No existing task definition, falling back to .aws/ecs-task-def-yolo.json"
            jq '. | del(.revision, .status, .registeredAt, .registeredBy, .compatibilities, .runtimePlatform, .requiresAttributes, .taskDefinitionArn, .inferenceAccelerators, .ephemeralStorage)' \
              .aws/ecs-task-def-yolo.json > task-def-yolo.json
          fi

          # Substitute the new image tag into the container definition.
          NEW_IMAGE=$(echo "${{ needs.build-yolo.outputs.image_tag }}" | tr -d ' ' | tr '\n' ' ' | awk '{print $1}')
          echo "New image: $NEW_IMAGE"
          jq --arg IMG "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMG' \
            task-def-yolo.json > task-def-yolo-final.json

          cat task-def-yolo-final.json

      - name: Deploy YOLO task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def-yolo-final.json
          service: ${{ env.ECS_SERVICE_YOLO }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true