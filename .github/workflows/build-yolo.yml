name: Build YOLO Docker Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/backend/src/model_detection/yolo_inference_service/**'
      - 'buildspec.yml'

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: cooksmart-yolo

jobs:
  build:
    name: Build and Push YOLO Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::294060270105:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=latest
            type=sha,prefix=,format=long

      - name: Build and push YOLO Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend/src/model_detection/yolo_inference_service
          file: ./src/backend/src/model_detection/yolo_inference_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in ECR
        run: |
          echo "Verifying image in ECR..."
          aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --query 'imageDetails[0].imageTags' --output text
          echo "✅ YOLO image built and pushed successfully!"
          echo "Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
