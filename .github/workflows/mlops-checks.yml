name: MLOps checks

on:
  pull_request:
    paths:
      - "mlops/**"
      - "tests/mlops/**"
      - "dvc.yaml"
      - "params.yaml"
      - "requirements-mlops.txt"
  push:
    branches: [main]
    paths:
      - "mlops/**"
      - "tests/mlops/**"
      - "dvc.yaml"
      - "params.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight validation dependencies
        run: pip install "dvc[s3]>=3.60,<4" "PyYAML>=6,<7"
      - name: Compile Python modules
        run: python -m compileall -q mlops
      - name: Run MLOps unit tests
        run: python -m unittest discover -s tests/mlops -p "test_*.py"
      - name: Validate DVC pipeline
        run: dvc dag
