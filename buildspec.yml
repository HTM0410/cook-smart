version: 0.2
# =============================================================================
# CodeBuild spec cho CookSmart - build 3 image: backend, yolo, drift
# Build xong day len ECR tao imagedefinitions.json lam input cho CodeDeploy
# =============================================================================

env:
  variables:
    AWS_REGION: us-east-1
    DOCKER_BUILDKIT: "1"

phases:
  install:
    runtime-versions:
      docker: 20

  pre_build:
    commands:
      - echo "Logging in to ECR $AWS_ACCOUNT_ID..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - ECR_BACKEND="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/cooksmart-backend"
      - ECR_YOLO="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/cooksmart-yolo"
      - ECR_DRIFT="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/cooksmart-drift"
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Tagging images with $IMAGE_TAG"

  build:
    commands:
      - echo "Build backend image..."
      - docker build --pull -f docker/backend.Dockerfile -t $ECR_BACKEND:$IMAGE_TAG -t $ECR_BACKEND:latest .
      - echo "Build yolo image..."
      - docker build --pull -f docker/yolo.Dockerfile -t $ECR_YOLO:$IMAGE_TAG -t $ECR_YOLO:latest .
      - echo "Build drift image..."
      - docker build --pull -f docker/drift.Dockerfile -t $ECR_DRIFT:$IMAGE_TAG -t $ECR_DRIFT:latest .
      - echo "Build summary:"
      - docker images | grep cooksmart

  post_build:
    commands:
      - echo "Pushing backend image..."
      - docker push $ECR_BACKEND:$IMAGE_TAG
      - docker push $ECR_BACKEND:latest
      - echo "Pushing yolo image..."
      - docker push $ECR_YOLO:$IMAGE_TAG
      - docker push $ECR_YOLO:latest
      - echo "Pushing drift image..."
      - docker push $ECR_DRIFT:$IMAGE_TAG
      - docker push $ECR_DRIFT:latest
      - echo "Creating imagedefinitions.json for CodeDeploy..."
      - printf '[{"name":"yolo","imageUri":"%s"}]' "$ECR_YOLO:$IMAGE_TAG" > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - appspec.yml
    - infra/scripts/validate_service.sh
  discard-paths: yes
  base-directory: .
