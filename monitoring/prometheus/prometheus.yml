global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    application: food-suggest
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: cooksmart-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: ingredient-yolo
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: cooksmart-drift
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8100"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]


remote_write: []  # Add remote_write destination once we choose backend
