<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  
  <!-- Cooking pot -->
  <path d="M 30 45 L 30 70 Q 30 75 35 75 L 65 75 Q 70 75 70 70 L 70 45 Q 70 40 65 40 L 35 40 Q 30 40 30 45 Z" 
        fill="url(#potGradient)" stroke="#ea580c" stroke-width="1.5"/>
  
  <!-- Pot handle left -->
  <path d="M 30 50 Q 20 50 20 55 Q 20 60 25 60 Q 30 60 30 55" 
        fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Pot handle right -->
  <path d="M 70 50 Q 80 50 80 55 Q 80 60 75 60 Q 70 60 70 55" 
        fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Steam/Lid -->
  <ellipse cx="50" cy="40" rx="20" ry="5" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Flame 1 -->
  <path d="M 40 35 Q 42 28 45 30 Q 48 32 46 35" 
        fill="url(#flameGradient)" opacity="0.9"/>
  
  <!-- Flame 2 -->
  <path d="M 50 33 Q 52 26 55 28 Q 58 30 56 33" 
        fill="url(#flameGradient)" opacity="0.9"/>
  
  <!-- Flame 3 -->
  <path d="M 60 35 Q 62 28 65 30 Q 68 32 66 35" 
        fill="url(#flameGradient)" opacity="0.9"/>
</svg>
