version: 0.2

env:
  variables:
    AWS_REGION: ap-southeast-1
    ECR_REGISTRY: 294060270105.dkr.ecr.ap-southeast-1.amazonaws.com
    ECR_REPOSITORY: cooksmart-backend

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG="${COMMIT_HASH:=manual-$(date +%Y%m%d-%H%M%S)}"
      - echo "Building backend image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  build:
    commands:
      - cd src/backend
      - echo "Building backend Docker image..."
      - docker build --no-cache -t backend-build -f Dockerfile .
      - docker tag backend-build $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - docker tag backend-build $ECR_REGISTRY/$ECR_REPOSITORY:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      - echo "Built and pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
      - echo "IMAGE_TAG=$IMAGE_TAG" > /tmp/backend-image-tag.txt
      - cat /tmp/backend-image-tag.txt

artifacts:
  files:
    - /tmp/backend-image-tag.txt
