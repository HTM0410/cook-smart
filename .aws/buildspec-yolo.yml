version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG="${COMMIT_HASH:=manual-$(date +%Y%m%d-%H%M%S)}"
      - ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY_YOLO}:${IMAGE_TAG}"
      - echo "Building image: $ECR_IMAGE"

  build:
    commands:
      - cd src/backend/src/model_detection/yolo_inference_service
      - echo "Building YOLO inference service image..."
      - docker build --no-cache --pull -t $ECR_IMAGE -f Dockerfile .
      - docker tag $ECR_IMAGE ${ECR_REGISTRY}/${ECR_REPOSITORY_YOLO}:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_IMAGE
      - docker push ${ECR_REGISTRY}/${ECR_REPOSITORY_YOLO}:latest
      - echo "Built and pushed: $ECR_IMAGE"
      - echo "IMAGE_TAG=$IMAGE_TAG" > /tmp/image-tag.env
      - echo "ECR_IMAGE=$ECR_IMAGE" >> /tmp/image-tag.env
      - cat /tmp/image-tag.env

artifacts:
  files:
    - /tmp/image-tag.env