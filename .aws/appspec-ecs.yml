version: 0.0

# CodeDeploy AppSpec for ECS Blue/Green Deployment
# This file is used by CodeDeploy to orchestrate the deployment

Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: <TASK_DEFINITION>
        LoadBalancerInfo:
          ContainerName: cooksmart-yolo
          ContainerPort: 8000
        # Optional: Override deployment config
        # DeploymentConfiguration:
        #   Name: cooksmart-yolo-canary-10

Hooks:
  # BeforeAllowTestTraffic: Run tasks before test traffic starts
  BeforeAllowTestTraffic:
    - Location: scripts/before_allow_test_traffic.sh
      Timeout: 300
      RunOrder: 1

  # AllowTestTraffic: Route test traffic to the replacement task set
  AllowTestTraffic:
    - Location: scripts/allow_test_traffic.sh
      Timeout: 300
      RunOrder: 2

  # AfterAllowTestTraffic: Run validation after test traffic
  AfterAllowTestTraffic:
    - Location: scripts/after_allow_test_traffic.sh
      Timeout: 600
      RunOrder: 3
      # On failure, deployment will rollback
      # ExitCode: Anything other than 0 triggers rollback

  # BeforeAllowProductionTraffic: Final checks before prod traffic
  BeforeAllowProductionTraffic:
    - Location: scripts/before_allow_production_traffic.sh
      Timeout: 300
      RunOrder: 4

  # AfterAllowProductionTraffic: Final validation after prod deployment
  AfterAllowProductionTraffic:
    - Location: scripts/after_allow_production_traffic.sh
      Timeout: 300
      RunOrder: 5

# File section: Copy files for hooks
files:
  - source: scripts/
    destination: /opt/codedeploy/scripts/
