# CookSmart Backend - CodeBuild Project
# Build Docker image và push lên ECR

version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building Docker image..."
      - docker build -t $ECR_REPOSITORY_BACKEND:$CODEBUILD_RESOLVED_SOURCE_VERSION ./src/backend
      - docker tag $ECR_REPOSITORY_BACKEND:$CODEBUILD_RESOLVED_SOURCE_VERSION $ECR_REPOSITORY_BACKEND:latest
      - echo "Pushing Docker image..."
      - docker push $ECR_REPOSITORY_BACKEND:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $ECR_REPOSITORY_BACKEND:latest

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Image pushed: $ECR_REPOSITORY_BACKEND:$CODEBUILD_RESOLVED_SOURCE_VERSION"

artifacts:
  files:
    - imagedefinitions.json
